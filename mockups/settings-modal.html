<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clay — Settings Modal Mockup</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    background: #08080a;
    color: #e4e4e7;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    line-height: 1.4;
  }

  /* ─── Backdrop ─── */
  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(2px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  /* ─── Modal shell ─── */
  .modal {
    width: min(92vw, 448px);
    background: #1a1a1f;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    box-shadow:
      0 24px 64px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(255, 255, 255, 0.03) inset;
    overflow: hidden;
    display: flex;
  }

  /* ─── Left sidebar ─── */
  .sidebar {
    width: 48px;
    flex-shrink: 0;
    background: #0e0e12;
    border-right: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    gap: 2px;
  }

  .tab-btn {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    border-radius: 7px;
    color: #52525b;
    cursor: pointer;
    transition: all 0.12s ease;
    padding: 0;
    position: relative;
  }

  .tab-btn:hover {
    background: rgba(255, 255, 255, 0.05);
    color: #a1a1aa;
  }

  .tab-btn.active {
    background: rgba(8, 145, 178, 0.12);
    color: #0891b2;
  }

  .tab-btn.active::before {
    content: '';
    position: absolute;
    left: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 16px;
    background: #0891b2;
    border-radius: 0 2px 2px 0;
  }

  .tab-btn svg {
    width: 18px;
    height: 18px;
  }

  /* ─── Right content ─── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ─── Header ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 4px;
  }

  .title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #71717a;
  }

  .close-btn {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    border-radius: 4px;
    color: #52525b;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.1s;
  }

  .close-btn:hover {
    background: rgba(255, 255, 255, 0.06);
    color: #a1a1aa;
  }

  /* ─── Body ─── */
  .body {
    padding: 8px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    flex: 1;
  }

  /* ─── Section visibility ─── */
  .section { display: none; }
  .section.active { display: flex; flex-direction: column; }

  /* ─── Setting rows ─── */
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 28px;
  }

  .label {
    width: 110px;
    flex-shrink: 0;
    font-size: 12px;
    color: #a1a1aa;
    text-align: right;
    white-space: nowrap;
  }

  .value {
    flex: 1;
    display: flex;
    align-items: center;
    min-width: 0;
  }

  /* ─── Select / dropdown ─── */
  select {
    width: 100%;
    padding: 5px 28px 5px 8px;
    background: #08080a;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 4px;
    color: #e4e4e7;
    font-family: inherit;
    font-size: 12px;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2371717a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    cursor: pointer;
    outline: none;
    transition: border-color 0.1s;
  }

  select:focus {
    border-color: #0891b2;
  }

  /* ─── Text input ─── */
  input[type="text"] {
    width: 100%;
    padding: 5px 8px;
    background: #08080a;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 4px;
    color: #e4e4e7;
    font-family: inherit;
    font-size: 12px;
    outline: none;
    transition: border-color 0.1s;
  }

  input[type="text"]:focus {
    border-color: #0891b2;
  }

  input[type="text"]::placeholder {
    color: #3f3f46;
  }

  /* ─── Stepper ─── */
  .stepper {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 4px;
    overflow: hidden;
    height: 26px;
  }

  .stepper-btn {
    width: 26px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #08080a;
    border: none;
    color: #71717a;
    cursor: pointer;
    font-size: 14px;
    font-weight: 400;
    transition: all 0.1s;
    padding: 0;
  }

  .stepper-btn:hover {
    background: #18181b;
    color: #e4e4e7;
  }

  .stepper-val {
    width: 36px;
    text-align: center;
    font-size: 12px;
    color: #e4e4e7;
    background: #0f0f12;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-left: 1px solid rgba(255, 255, 255, 0.06);
    border-right: 1px solid rgba(255, 255, 255, 0.06);
  }

  /* ─── Toggle switch ─── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 0;
  }

  .toggle-label {
    font-size: 12px;
    color: #a1a1aa;
  }

  .toggle {
    width: 32px;
    height: 18px;
    background: #27272a;
    border-radius: 9px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
    flex-shrink: 0;
    border: none;
    padding: 0;
  }

  .toggle.on {
    background: #0891b2;
  }

  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    background: #e4e4e7;
    border-radius: 50%;
    transition: transform 0.15s;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
  }

  .toggle.on::after {
    transform: translateX(14px);
  }

  /* ─── Two-column toggles ─── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 24px;
    margin-top: 4px;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.015);
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.03);
  }

  /* ─── Divider ─── */
  .divider {
    height: 1px;
    background: rgba(255, 255, 255, 0.05);
    margin: 4px 0;
  }

  /* ─── Footer ─── */
  .footer {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px 10px;
  }

  .footer-spacer { flex: 1; }

  .btn {
    padding: 6px 14px;
    background: #27272a;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 5px;
    color: #a1a1aa;
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.1s;
    letter-spacing: 0.01em;
  }

  .btn:hover {
    background: #3f3f46;
    color: #e4e4e7;
    border-color: rgba(255, 255, 255, 0.12);
  }

  .btn-primary {
    background: #0891b2;
    border-color: #0891b2;
    color: #08080a;
    font-weight: 600;
  }

  .btn-primary:hover {
    background: #22d3ee;
    border-color: #22d3ee;
  }

  .btn-help {
    width: 26px;
    height: 26px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    border-radius: 50%;
    color: #52525b;
  }

  .btn-help:hover {
    color: #0891b2;
    background: rgba(8, 145, 178, 0.08);
    border-color: rgba(8, 145, 178, 0.2);
  }

  /* ─── TLS fields show/hide ─── */
  .tls-field { display: none; }
  .tls-field.visible { display: flex; }
</style>
</head>
<body>

<div class="backdrop">
  <div class="modal">
    <!-- Sidebar -->
    <div class="sidebar">
      <button class="tab-btn active" data-tab="general" title="General">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <circle cx="10" cy="10" r="2.8"/>
          <path d="M10 2v2.2M10 15.8V18M2 10h2.2M15.8 10H18M4.2 4.2l1.6 1.6M14.2 14.2l1.6 1.6M4.2 15.8l1.6-1.6M14.2 5.8l1.6-1.6"/>
        </svg>
      </button>
      <button class="tab-btn" data-tab="web" title="Web">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <circle cx="10" cy="10" r="7.5"/>
          <ellipse cx="10" cy="10" rx="3.2" ry="7.5"/>
          <path d="M2.8 7.5h14.4M2.8 12.5h14.4"/>
        </svg>
      </button>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="header">
        <span class="title" id="tab-title">General</span>
        <button class="close-btn">&#10005;</button>
      </div>

      <!-- ═══ General section ═══ -->
      <div class="body section active" id="sec-general">
        <div class="row">
          <span class="label">World Switching</span>
          <div class="value">
            <select>
              <option>Unseen First</option>
              <option>Alphabetical</option>
            </select>
          </div>
        </div>

        <div class="row">
          <span class="label">Theme</span>
          <div class="value">
            <select>
              <option>Dark</option>
              <option>Light</option>
            </select>
          </div>
        </div>

        <div class="row">
          <span class="label">Color Offset</span>
          <div class="value">
            <div class="stepper">
              <button class="stepper-btn" onclick="step('color',-5)">−</button>
              <span class="stepper-val" id="color-val">0%</span>
              <button class="stepper-btn" onclick="step('color',5)">+</button>
            </div>
          </div>
        </div>

        <div class="row">
          <span class="label">Input Height</span>
          <div class="value">
            <div class="stepper">
              <button class="stepper-btn" onclick="step('height',-1)">−</button>
              <span class="stepper-val" id="height-val">3</span>
              <button class="stepper-btn" onclick="step('height',1)">+</button>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="two-col">
          <div class="toggle-row">
            <span class="toggle-label">More Mode</span>
            <button class="toggle on" onclick="this.classList.toggle('on')"></button>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">ANSI Music</span>
            <button class="toggle" onclick="this.classList.toggle('on')"></button>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">TLS Proxy</span>
            <button class="toggle on" onclick="this.classList.toggle('on')"></button>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">ZWJ Sequence</span>
            <button class="toggle" onclick="this.classList.toggle('on')"></button>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">New Indicator</span>
            <button class="toggle on" onclick="this.classList.toggle('on')"></button>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Debug</span>
            <button class="toggle" onclick="this.classList.toggle('on')"></button>
          </div>
        </div>
      </div>

      <!-- ═══ Web section ═══ -->
      <div class="body section" id="sec-web">
        <div class="row">
          <span class="label">Protocol</span>
          <div class="value">
            <select id="proto-select" onchange="toggleTls()">
              <option value="non-secure">Non-Secure</option>
              <option value="secure">Secure</option>
            </select>
          </div>
        </div>

        <div class="row">
          <span class="label">HTTP Enabled</span>
          <div class="value">
            <select>
              <option>off</option>
              <option selected>on</option>
            </select>
          </div>
        </div>

        <div class="row">
          <span class="label">HTTP Port</span>
          <div class="value">
            <input type="text" value="9000">
          </div>
        </div>

        <div class="row">
          <span class="label">Allow List</span>
          <div class="value">
            <input type="text" placeholder="localhost, 192.168.*">
          </div>
        </div>

        <div class="row tls-field" id="tls-cert">
          <span class="label">TLS Cert File</span>
          <div class="value">
            <input type="text" placeholder="/path/to/cert.pem">
          </div>
        </div>

        <div class="row tls-field" id="tls-key">
          <span class="label">TLS Key File</span>
          <div class="value">
            <input type="text" placeholder="/path/to/key.pem">
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <button class="btn btn-help">?</button>
        <span class="footer-spacer"></span>
        <button class="btn">Cancel</button>
        <button class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('sec-' + btn.dataset.tab).classList.add('active');
      document.getElementById('tab-title').textContent =
        btn.dataset.tab === 'general' ? 'General' : 'Web';
    });
  });

  // Stepper controls
  const vals = { color: 0, height: 3 };
  function step(id, delta) {
    vals[id] += delta;
    if (id === 'color') {
      vals[id] = Math.max(0, Math.min(100, vals[id]));
      document.getElementById('color-val').textContent = vals[id] + '%';
    } else {
      vals[id] = Math.max(1, Math.min(15, vals[id]));
      document.getElementById('height-val').textContent = vals[id];
    }
  }

  // TLS field visibility
  function toggleTls() {
    const secure = document.getElementById('proto-select').value === 'secure';
    document.querySelectorAll('.tls-field').forEach(el => {
      el.classList.toggle('visible', secure);
    });
  }
</script>

</body>
</html>
